<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Authsnap Grant Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#eae8e2;--surface:#f2f0eb;--surface2:#dddbd5;
  --b
:root{
  --bg:#0B1220;
  --surface:#111827;
  --surface2:#1a2436;
  --surface3:#1e2d42;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:#F8FAFC;
  --text2:#CBD5E1;
  --text3:#94A3B8;
  --text4:#64748B;
  --blue:#2563EB;
  --blue2:#1d52cc;
  --blue-light:#3B82F6;
  --blue-glow:rgba(37,99,235,0.15);
  --gold:#D4AF37;
  --gold-dim:#b8952e;
  --gold-glow:rgba(212,175,55,0.12);
  --green:#10B981;
  --green-glow:rgba(16,185,129,0.12);
  --red:#EF4444;
  --red-glow:rgba(239,68,68,0.12);
  --amber:#F59E0B;
  --radius:10px;
  --radius-lg:14px;
  --radius-xl:18px;
  --shadow:0 1px 3px rgba(0,0,0,0.4),0 1px 2px rgba(0,0,0,0.3);
  --shadow-lg:0 4px 16px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}

/* LAYOUT */
.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.main{display:flex;flex-direction:column;min-height:100vh;background:var(--bg)}

/* SIDEBAR */
.logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.logo-wordmark{display:flex;align-items:center;font-family:'Inter',sans-serif;font-size:20px;font-weight:700;line-height:1;letter-spacing:-0.5px}
.logo-auth{color:var(--text)}
.logo-snap{color:var(--blue-light)}
.logo-icon{margin-left:5px;font-size:14px;color:var(--gold)}
.logo-tagline{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:2.5px;margin-top:6px;font-family:'JetBrains Mono',monospace}
.logo-sub{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;font-family:'JetBrains Mono',monospace}
.nav{padding:16px 12px;flex:1}
.nav-section{font-size:10px;color:var(--text4);text-transform:uppercase;letter-spacing:2px;padding:12px 10px 6px;font-family:'JetBrains Mono',monospace}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;color:var(--text3);font-size:13px;font-weight:400;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;letter-spacing:-0.1px}
.nav-item:hover{background:var(--surface2);color:var(--text2)}
.nav-item.active{background:var(--blue-glow);color:var(--blue-light);border:1px solid rgba(37,99,235,0.2)}
.sidebar-footer{padding:16px 12px;border-top:1px solid var(--border)}
.team-badge{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);background:rgba(255,255,255,0.03);border:1px solid var(--border)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.team-text{font-size:11px;color:var(--text4)}
.team-name{font-size:12px;color:var(--text2);font-weight:500}
.name-input{width:100%;margin-top:8px;padding:8px 11px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .15s}
.name-input:focus{border-color:rgba(37,99,235,0.4)}
.name-input::placeholder{color:var(--text4)}

/* TOPBAR */
.topbar{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.page-title{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
.page-sub{font-size:12px;color:var(--text3);margin-top:3px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .15s;font-family:'Inter',sans-serif;letter-spacing:-0.1px}
.btn:hover{border-color:rgba(255,255,255,0.2);background:var(--surface3);color:var(--text)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue2);border-color:var(--blue2)}
.btn-green{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.3);color:var(--green)}
.btn-green:hover{background:rgba(16,185,129,0.22)}
.btn-gold{background:rgba(212,175,55,0.12);border-color:rgba(212,175,55,0.25);color:var(--gold)}
.btn-gold:hover{background:rgba(212,175,55,0.2)}

/* TABS */
.tabs{display:flex;padding:0 28px;border-bottom:1px solid var(--border);background:var(--surface)}
.tab{padding:13px 18px;font-size:13px;font-weight:400;color:var(--text4);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;letter-spacing:-0.1px}
.tab:hover{color:var(--text3)}
.tab.active{color:var(--blue-light);border-bottom-color:var(--blue);font-weight:500}

/* CONTENT */
.content{flex:1;padding:28px;overflow-y:auto}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 22px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat:nth-child(1)::before{background:var(--blue)}
.stat:nth-child(2)::before{background:var(--green)}
.stat:nth-child(3)::before{background:var(--red)}
.stat:nth-child(4)::before{background:var(--gold)}
.stat-num{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text);letter-spacing:-1px;margin-top:4px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-top:6px;font-weight:500}
.stat-sub{font-size:11px;color:var(--text4);margin-top:3px}

/* SCAN PANEL */
.scan-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:24px;overflow:hidden;box-shadow:var(--shadow)}
.scan-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:rgba(37,99,235,0.05)}
.scan-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-glow);flex-shrink:0}
.scan-dot.running{animation:blink 0.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.scan-title{font-size:13px;font-weight:500;color:var(--text);letter-spacing:-0.2px}
.scan-status{font-size:11px;color:var(--text4);font-family:'JetBrains Mono',monospace;margin-left:auto}
.scan-config{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--bg)}
.scan-select{padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;cursor:pointer}
.scan-select option{background:var(--surface);color:var(--text)}
.scan-input{flex:1;min-width:160px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none}
.scan-input::placeholder{color:var(--text4)}
.scan-input:focus,.scan-select:focus{border-color:rgba(37,99,235,0.4)}
.scan-log{padding:12px 20px;max-height:110px;overflow-y:auto;background:#070d17}
.log-line{font-size:11px;color:rgba(255,255,255,0.35);padding:2px 0;display:flex;gap:10px;font-family:'JetBrains Mono',monospace;line-height:1.5}
.log-time{color:rgba(255,255,255,0.15);flex-shrink:0;min-width:64px}
.log-icon{flex-shrink:0;min-width:14px}
.log-ok{color:var(--green)}
.log-err{color:var(--red)}
.log-search{color:var(--blue-light)}

/* ERROR BANNER */
.error-banner{background:var(--red-glow);border:1px solid rgba(239,68,68,0.25);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px;display:none}
.error-banner.show{display:flex;gap:12px;align-items:flex-start}
.error-banner-icon{font-size:16px;flex-shrink:0}
.error-banner-text{font-size:12px;color:#fca5a5;line-height:1.6}
.error-banner-text strong{display:block;font-size:13px;margin-bottom:3px;color:#fecaca}

/* SETUP NOTICE */
#setupNotice{background:var(--gold-glow);border:1px solid rgba(212,175,55,0.2);border-radius:var(--radius-lg);padding:18px 22px;margin-bottom:20px;display:none}

/* SEARCH ROW */
.search-row{display:flex;gap:10px;margin-bottom:20px;align-items:center}
.search-box{flex:1;position:relative}
.search-box input{width:100%;padding:10px 14px 10px 38px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;outline:none;transition:border-color .15s;font-family:'Inter',sans-serif}
.search-box input:focus{border-color:rgba(37,99,235,0.4)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text4);font-size:14px}
.filter-select{padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:13px;outline:none;cursor:pointer;font-family:'Inter',sans-serif}
.filter-select:focus{border-color:rgba(37,99,235,0.4)}

/* GRANT CARDS */
.grants-grid{display:flex;flex-direction:column;gap:12px}
.grant-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;transition:border-color .2s,box-shadow .2s;box-shadow:var(--shadow)}
.grant-card:hover{border-color:var(--border2);box-shadow:var(--shadow-lg)}
.grant-card.tier1{border-left:3px solid var(--blue)}
.grant-card.tier2{border-left:3px solid var(--gold)}
.grant-card.tier3{border-left:3px solid var(--text4)}
.grant-card.new-grant{border-left:3px solid var(--green);background:rgba(16,185,129,0.04)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.45;letter-spacing:-0.2px}
.card-funder{font-size:12px;color:var(--text4);margin-top:3px;font-weight:400}
.badges{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;font-family:'JetBrains Mono',monospace;letter-spacing:0.2px}
.badge-t1{background:var(--blue-glow);color:#93c5fd;border:1px solid rgba(37,99,235,0.25)}
.badge-t2{background:var(--gold-glow);color:#fde68a;border:1px solid rgba(212,175,55,0.25)}
.badge-t3{background:rgba(255,255,255,0.04);color:var(--text4);border:1px solid var(--border)}
.badge-new{background:var(--green-glow);color:#6ee7b7;border:1px solid rgba(16,185,129,0.25)}
.badge-urgent{background:var(--red-glow);color:#fca5a5;border:1px solid rgba(239,68,68,0.25)}
.badge-open{background:var(--green-glow);color:#6ee7b7;border:1px solid rgba(16,185,129,0.25)}
.badge-watch{background:rgba(245,158,11,0.1);color:#fcd34d;border:1px solid rgba(245,158,11,0.25)}
.badge-closed{background:rgba(255,255,255,0.04);color:var(--text4);border:1px solid var(--border)}
.card-body{font-size:13px;color:var(--text3);line-height:1.7;margin-bottom:14px;font-weight:400}
.card-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.meta-item{background:var(--bg);border-radius:var(--radius);padding:10px 13px;border:1px solid var(--border)}
.meta-label{font-size:10px;color:var(--text4);text-transform:uppercase;letter-spacing:1.2px;font-family:'JetBrains Mono',monospace;font-weight:500}
.meta-val{font-size:12px;color:var(--text2);margin-top:4px;font-weight:500;line-height:1.4}
.card-note{font-size:11px;color:#fde68a;background:var(--gold-glow);border-left:3px solid var(--gold);border-radius:0 var(--radius) var(--radius) 0;padding:9px 12px;margin-bottom:12px;font-family:'JetBrains Mono',monospace;line-height:1.6}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)}
.apply-link{font-size:12px;color:var(--blue-light);text-decoration:none;font-family:'JetBrains Mono',monospace;font-weight:500}
.apply-link:hover{text-decoration:underline;color:#60a5fa}
.card-actions{display:flex;gap:7px}
.icon-btn{padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border);background:none;color:var(--text4);cursor:pointer;font-size:11px;transition:all .15s;font-family:'JetBrains Mono',monospace}
.icon-btn:hover{background:var(--surface2);color:var(--text2);border-color:var(--border2)}
.icon-btn.saved{color:var(--gold);border-color:rgba(212,175,55,0.3);background:var(--gold-glow)}

/* CONTACTS */
.contacts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.contact-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);transition:border-color .2s}
.contact-card:hover{border-color:var(--border2)}
.contact-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.contact-avatar{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0;color:#fff}
.contact-name{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.2px}
.contact-role{font-size:11px;color:var(--text4);margin-top:2px}
.contact-org{font-size:12px;color:var(--text3);margin-top:2px}
.contact-details{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;font-size:12px}
.contact-detail{display:flex;align-items:center;gap:8px;color:var(--text3)}
.contact-detail a{color:var(--blue-light);text-decoration:none}
.contact-detail a:hover{text-decoration:underline}
.contact-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.contact-tag{font-size:10px;padding:3px 8px;border-radius:20px;background:rgba(255,255,255,0.05);color:var(--text4);font-family:'JetBrains Mono',monospace;border:1px solid var(--border)}
.contact-note{font-size:11px;color:var(--text4);line-height:1.6;margin-bottom:14px}
.contact-btns{display:flex;gap:7px}
.contact-btn{flex:1;padding:8px;border-radius:var(--radius);border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-size:11px;transition:all .15s;text-align:center;font-family:'Inter',sans-serif;font-weight:500}
.contact-btn:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.contact-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.contact-btn.primary:hover{background:var(--blue2)}

/* EMAIL MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(7,13,23,0.75);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-xl);width:700px;max-width:95vw;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
.modal-sub{font-size:12px;color:var(--text4);margin-top:3px}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text4);line-height:1;padding:4px;border-radius:6px;transition:all .15s}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:22px 24px;overflow-y:auto;flex:1}
.email-tabs{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.etab{padding:7px 16px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text3);transition:all .15s;font-family:'Inter',sans-serif;font-weight:500}
.etab:hover{background:var(--surface2);color:var(--text2)}
.etab.active{background:var(--blue);border-color:var(--blue);color:#fff}
.field-label{font-size:11px;color:var(--text4);text-transform:uppercase;letter-spacing:1.2px;font-family:'JetBrains Mono',monospace;margin-bottom:6px;margin-top:16px;font-weight:500}
.field-label:first-child{margin-top:0}
.e-input{width:100%;padding:10px 13px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;outline:none;font-family:'Inter',sans-serif;transition:border-color .15s}
.e-input:focus{border-color:rgba(37,99,235,0.4)}
.e-area{width:100%;padding:12px 13px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:13px;outline:none;resize:vertical;min-height:260px;line-height:1.7;font-family:'Inter',sans-serif;transition:border-color .15s}
.e-area:focus{border-color:rgba(37,99,235,0.4)}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:9px;justify-content:flex-end}

/* ACTIVITY */
.activity-feed{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px}
.act-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.act-item:last-child{border-bottom:none}
.act-av{width:26px;height:26px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--text4);flex-shrink:0;font-family:'JetBrains Mono',monospace}
.act-text{color:var(--text3);line-height:1.5;flex:1}
.act-text strong{color:var(--text2);font-weight:500}
.act-time{color:var(--text4);font-family:'JetBrains Mono',monospace;font-size:11px;white-space:nowrap}

/* SCAN INFO BAR */
.scan-info-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--green-glow);border:1px solid rgba(16,185,129,0.15);border-radius:var(--radius);margin-bottom:16px;font-size:12px;color:var(--text3)}
.scan-info-bar span{font-family:'JetBrains Mono',monospace}
.scan-fresh{color:var(--green);font-weight:600}

/* SECTION HEADER */
.section-hd{font-size:11px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-family:'JetBrains Mono',monospace}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 20px;color:var(--text4)}
.empty-icon{font-size:40px;margin-bottom:14px;opacity:.25}
.empty-title{font-size:15px;color:var(--text3);margin-bottom:8px;font-weight:500}
.empty-sub{font-size:13px;color:var(--text4)}

@media(max-width:768px){
  .shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .stats{grid-template-columns:1fr 1fr}
  .card-meta{grid-template-columns:1fr 1fr}
  .contacts-grid{grid-template-columns:1fr}
  .content{padding:16px}
  .topbar{padding:14px 16px}
}
 <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="mTitle">Draft Email</div>
        <div class="modal-sub" id="mSub">Authsnap · Revolutionizing Denials Management</div>
      </div>
      <button class="modal-close" onclick="closeEmail()">✕</button>
    </div>
    <div class="modal-body">
      <div class="email-tabs" id="eTabs"></div>
      <div class="field-label">To</div>
      <input class="e-input" id="eTo" readonly/>
      <div class="field-label">Subject</div>
      <input class="e-input" id="eSubject"/>
      <div class="field-label">Body</div>
      <textarea class="e-area" id="eBody"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeEmail()">Cancel</button>
      <button class="btn" onclick="copyEmail()">⎘ Copy</button>
      <button class="btn btn-green" onclick="openMailto()">↗ Open in mail</button>
    </div>
  </div>
</div>

<div class="shell">
<aside class="sidebar">
  <div class="logo">
    <div class="logo-wordmark">
      <span class="logo-auth">Auth</span><span class="logo-snap">snap</span><span class="logo-icon">✦</span>

function ts(){const n=new Date();return[n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':')}

function slog(icon,msg,cls=''){
  const el=document.getElementById('scanLog');
  const line=document.createElement('div');
  line.className='log-line';
  line.innerHTML=`<span class="log-time">${ts()}</span><span class="log-icon ${cls}">${icon}</span><span class="${cls}">${msg}</span>`;
  el.appendChild(line);
  el.scrollTop=el.scrollHeight;
}

function setName(n){if(!n.trim())return;userName=n.trim();document.getElementById('userName').textContent=userName;document.getElementById('userAvatar').textContent=userName.substring(0,2).toUpperCase();}

function updateStats(){
  document.getElementById('sTotal').textContent=grants.length;
  document.getElementById('sOpen').textContent=grants.filter(g=>g.status==='open'||g.status==='urgent').length;
  document.getElementById('sUrgent').textContent=grants.filter(g=>g.status==='urgent').length;
  document.getElementById('sNew').textContent=newGrantIds.size;
}

function statusBadge(s){
  if(s==='urgent')return'<span class="badge badge-urgent">⚡ Urgent</span>';
  if(s==='open')return'<span class="badge badge-open">● Open</span>';
  if(s==='watch')return'<span class="badge badge-watch">◎ Watch</span>';
  return'<span class="badge badge-closed">✕ Closed</span>';
}
function tierBadge(t){
  if(t==='tier1')return'<span class="badge badge-t1">Tier 1</span>';
  if(t==='tier2')return'<span class="badge badge-t2">Tier 2</span>';
  return'<span class="badge badge-t3">Tier 3</span>';
}

function filterList(){
  let list=[...grants];
  const q=(document.getElementById('searchInput')||{}).value||'';
  const tier=(document.getElementById('fTier')||{}).value||'';
  const status=(document.getElementById('fStatus')||{}).value||'';
  if(q)list=list.filter(g=>(g.title+g.funder+g.description+(g.notes||'')).toLowerCase().includes(q.toLowerCase()));
  if(tier)list=list.filter(g=>g.tier===tier);
  if(status)list=list.filter(g=>g.status===status);
  if(currentTab==='tier1')list=list.filter(g=>g.tier==='tier1');
  if(currentTab==='tier2')list=list.filter(g=>g.tier==='tier2');
  if(currentTab==='open')list=list.filter(g=>g.status==='open');
  if(currentTab==='urgent')list=list.filter(g=>g.status==='urgent');
  if(currentTab==='new')list=list.filter(g=>newGrantIds.has(g.id));
  return list;
}

        <a class="apply-link" href="${g.apply_url}" target="_blank">→ ${g.apply_url.replace('https://','').replace('http://','').split('/')[0]}</a>
        <div class="card-actions">
          <button class="icon-btn ${savedIds.has(g.id)?'saved':''}" onclick="toggleSave('${g.id}')">${savedIds.has(g.id)?'★ Saved':'☆ Save'}</button>
          ${emailBtn}
          <button class="icon-btn" onclick="copyGrant('${g.id}')">⎘ Copy</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleSave(id){
  const g=grants.find(x=>x.id===id);if(!g)return;
  if(savedIds.has(id)){savedIds.delete(id);addActivity(userName,'removed',g.title);}
  else{savedIds.add(id);addActivity(userName,'saved',g.title);}
  updateStats();
  if(currentView==='saved')renderGrants(grants.filter(g=>savedIds.has(g.id)));
  else renderGrants(filterList());
}

function addActivity(who,action,what){activity.unshift({who,action,what,time:ts()});if(activity.length>100)activity.pop();}

function copyGrant(id){
  const g=grants.find(x=>x.id===id);if(!g)return;
  navigator.clipboard.writeText(`${g.title}\nFunder: ${g.funder}\nAmount: ${g.amount}\nDeadline: ${g.deadline}\nApply: ${g.apply_url}\nContact: ${g.contact}\n\n${g.description}\n\nNotes: ${g.notes||'—'}`).catch(()=>{});
  const btn=document.querySelector(`#card-${id} .icon-btn:last-child`);
  if(btn){btn.textContent='✓ Copied';setTimeout(()=>btn.textContent='⎘ Copy',1500);}
}

function filterGrants(){renderGrants(filterList())}

function setTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');
  if(currentView==='monitor')renderGrants(filterList());
}

function setView(view,el){
  currentView=view;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  const titles={monitor:'Grant Monitor',saved:'Saved Grants',contacts:'Contacts & Outreach',activity:'Team Activity'};
  const subs={monitor:'Live web scan — all categories, all sources',saved:'Grants your team has bookmarked',contacts:'Key program officers with ready-to-send email templates',activity:'Recent team actions'};
  document.getElementById('pageTitle').textContent=titles[view];
  document.getElementById('pageSub').textContent=subs[view];
  const sp=document.getElementById('scanPanel');
  const sr=document.getElementById('searchRow');
  const tb=document.getElementById('tabBar');
  const sb=document.getElementById('scanBtn');
  const sib=document.getElementById('scanInfoBar');
  if(view==='activity'){
    sp.style.display='none';sr.style.display='none';tb.style.display='none';sb.style.display='none';sib.style.display='none';
    renderActivity();
  } else if(view==='saved'){
    sp.style.display='none';sr.style.display='flex';tb.style.display='none';sb.style.display='none';sib.style.display='none';
    renderGrants(grants.filter(g=>savedIds.has(g.id)));
  } else if(view==='contacts'){
    sp.style.display='none';sr.style.display='none';tb.style.display='none';sb.style.display='none';sib.style.display='none';
    renderContacts();
  } else {
    sp.style.display='';sr.style.display='flex';tb.style.display='flex';sb.style.display='';
    if(lastScanTime)sib.style.display='flex'; else sib.style.display='none';
    renderGrants(filterList());
  }
}

function renderContacts(){
  document.getElementById('grantsGrid').innerHTML=`<div class="section-hd">${CONTACTS.length} program contacts</div>
  <div class="contacts-grid">${CONTACTS.map(c=>`
    <div class="contact-card">
      <div class="contact-header">
        <div class="contact-avatar" style="background:${c.color}">${c.name.split(' ').map(w=>w[0]).join('').substring(0,2)}</div>
        <div><div class="contact-name">${c.name}</div><div class="contact-role">${c.role}</div><div class="contact-org">${c.org}</div></div>
      </div>
      <div class="contact-details">
        <div class="contact-detail">✉ <a href="mailto:${c.email}">${c.email}</a></div>
        <div class="contact-detail">🔗 <a href="${c.website}" target="_blank">${c.website.replace('https://','').split('/')[0]}</a></div>
      </div>
      <div class="contact-tags">${c.tags.map(t=>`<span class="contact-tag">${t}</span>`).join('')}</div>
      <div class="contact-note">${c.note}</div>
      <div class="contact-btns">
        <button class="contact-btn" onclick="openEmail('${c.id}','intro')">Intro</button>
        <button class="contact-btn" onclick="openEmail('${c.id}','inquiry')">Inquiry</button>
        <button class="contact-btn primary" onclick="openEmail('${c.id}','followup')">Follow-up</button>
      </div>
    </div>`).join('')}
  </div>`;
}

function renderActivity(){
  const el=document.getElementById('grantsGrid');
  if(!activity.length){el.innerHTML=`<div class="empty"><div class="empty-icon">◎</div><div class="empty-title">No activity yet</div><div class="empty-sub">Save grants and run scans to see activity</div></div>`;return;}
  el.innerHTML=`<div class="activity-feed">${activity.map(a=>`
    <div class="act-item">
      <div class="act-av">${a.who.substring(0,2).toUpperCase()}</div>
      <div class="act-text"><strong>${a.who}</strong> ${a.action} — ${a.what.substring(0,70)}${a.what.length>70?'...':''}</div>
      <div class="act-time">${a.time}</div>
    </div>`).join('')}</div>`;
}

/* ── EMAIL ─────────────────────────────────────────────────────────────── */
function openEmailForGrant(grantId){
  const g=grants.find(x=>x.id===grantId);
  if(!g||!g.contact_id)return;
  openEmail(g.contact_id,'inquiry');
}

function openEmail(contactId,tmpl){
  activeContact=CONTACTS.find(c=>c.id===contactId);
  if(!activeContact)return;
  activeTmpl=tmpl||'intro';
  document.getElementById('mTitle').textContent=`Email — ${activeContact.name}`;
  document.getElementById('mSub').textContent=activeContact.org;
  buildETabs();
  fillEmail(activeTmpl);
  document.getElementById('emailOverlay').classList.add('open');
}

function buildETabs(){
  document.getElementById('eTabs').innerHTML=Object.entries(ETEMPLATES).map(([k,t])=>
    `<button class="etab ${k===activeTmpl?'active':''}" onclick="switchTmpl('${k}')">${t.label}</button>`).join('');
}

function switchTmpl(k){
  activeTmpl=k;
  document.querySelectorAll('.etab').forEach((b,i)=>{const keys=Object.keys(ETEMPLATES);b.classList.toggle('active',keys[i]===k);});
  fillEmail(k);
}

function fillEmail(k){
  const t=ETEMPLATES[k];
  document.getElementById('eTo').value=activeContact.email;
  document.getElementById('eSubject').value=t.subj(activeContact);
  document.getElementById('eBody').value=t.body(activeContact);
}

function closeEmail(){document.getElementById('emailOverlay').classList.remove('open');}

function copyEmail(){
  const text=`To: ${document.getElementById('eTo').value}\nSubject: ${document.getElementById('eSubject').value}\n\n${document.getElementById('eBody').value}`;
  navigator.clipboard.writeText(text).catch(()=>{});
  const btn=event.currentTarget;btn.textContent='✓ Copied!';setTimeout(()=>btn.textContent='⎘ Copy',1800);
}

function openMailto(){
  const to=encodeURIComponent(document.getElementById('eTo').value);
  const sub=encodeURIComponent(document.getElementById('eSubject').value);
  const body=encodeURIComponent(document.getElementById('eBody').value);
  window.open(`mailto:${to}?subject=${sub}&body=${body}`,'_blank');
}

document.getElementById('emailOverlay').addEventListener('click',function(e){if(e.target===this)closeEmail();});

/* ── SCAN ───────────────────────────────────────────────────────────────── */
async function runScan(){
  const btn=document.getElementById('scanBtn');
  const dot=document.getElementById('scanDot');
  const errBanner=document.getElementById('errBanner');
  errBanner.classList.remove('show');

  if(WORKER_URL==='YOUR_WORKER_URL_HERE'){
    document.getElementById('setupNotice').style.display='block';
    slog('⚠','Worker URL not configured — see SETUP.md for deployment instructions','log-err');
    document.getElementById('scanStatus').textContent='Setup required';
    return;
  }

  btn.disabled=true;btn.textContent='◌ Scanning...';
  dot.classList.add('running');
  document.getElementById('scanStatus').textContent='Scanning...';
  document.getElementById('scanLog').innerHTML='';

  const category=document.getElementById('cfgCategory').value;
  const min=parseInt(document.getElementById('cfgMin').value)||0;
  const keywords=document.getElementById('cfgKeywords').value.trim();
  const existingIds=grants.map(g=>g.id);

  slog('◈',`Scan started · category: ${category} · min: ${min>0?'$'+min.toLocaleString():'any'}${keywords?' · keywords: '+keywords:''}`);
  slog('🌐','Connecting to Grant Scout — searching grants.gov, foundations, SBIR, HRSA...','log-search');

  try{
    const res=await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({category,keywords,fundingMin:min,existingIds})
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({error:'HTTP '+res.status}));
      throw new Error(err.error||'HTTP '+res.status);
    }

    const data=await res.json();

    if(data.searches&&data.searches.length){
      data.searches.forEach(q=>slog('⌕','Searched: '+q,'log-search'));
    }

    const incoming=data.grants||[];
    const existingSet=new Set(grants.map(g=>g.id));
    const fresh=incoming.filter(g=>g.id&&g.title&&!existingSet.has(g.id));

    fresh.forEach(g=>{
      newGrantIds.add(g.id);
      addActivity(userName,'found',g.title);
    });

    grants=[...grants,...fresh];
    lastScanTime=new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    document.getElementById('lastScanTime').textContent=lastScanTime;
    document.getElementById('newCount').textContent=fresh.length>0?`✦ ${fresh.length} new grant${fresh.length>1?'s':''} found`:'No new grants this scan';
    document.getElementById('scanInfoBar').style.display='flex';

    slog('✓',`Scan complete — ${incoming.length} found across all sources, ${fresh.length} new added to database`,'log-ok');
    document.getElementById('scanStatus').textContent=`Last scan: ${ts()} · ${fresh.length} new`;

    updateStats();
    if(currentView==='monitor')renderGrants(filterList());

  } catch(err){
    slog('✕','Scan error: '+err.message,'log-err');
    document.getElementById('scanStatus').textContent='Error — check log';
    document.getElementById('errTitle').textContent='Scan failed';
    document.getElementById('errMsg').textContent=' '+err.message+' — Check that your Railway service is running and RAILWAY_URL is set correctly in index.html.';
    errBanner.classList.add('show');
  }

  dot.classList.remove('running');
  btn.disabled=false;btn.textContent='⟳ Scan Now';
}

/* ── INIT ───────────────────────────────────────────────────────────────── */
(function(){
  updateStats();
  renderGrants(BASE_GRANTS);
  if(WORKER_URL==='YOUR_WORKER_URL_HERE'){
    slog('⚠','Worker URL not set — open SETUP.md to configure your Railway URL','log-err');
    document.getElementById('scanStatus').textContent='Setup required';
  } else {
    slog('◈',`${BASE_GRANTS.length} grants loaded · ${CONTACTS.length} contacts ready`);
    slog('◈','Click "Scan Now" to search all sources live, or wait for Monday auto-scan');
    document.getElementById('scanStatus').textContent='Ready';
  }
})();
</script>
